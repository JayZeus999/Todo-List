<!-- template.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

</head>

<body>
    <div class="sidebar">
        <div class="profile-bar">

            <div class="profile">
                <div class="profile-pic">
                    <img src="../images/profile-pic.jpg" alt="profile-pic">

                </div>
                <p class="profile-name">Joseph</p>

                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-chevron-down-icon lucide-chevron-down">
                    <path d="m6 9 6 6 6-6" />
                </svg>
            </div>

            <div class="icons">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-bell-icon lucide-bell">
                    <path d="M10.268 21a2 2 0 0 0 3.464 0" />
                    <path
                        d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326" />
                </svg>

                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-columns2-icon lucide-columns-2">
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="M12 3v18" />
                </svg>
            </div>
        </div>

        <div class="utilities">
            <button class="search-btn">Search</button>
            <button class="project-btn">My Projects</button>
            <button class="habit-btn">Habit Tracker</button>
            <button class="matrix-btn">Eisenhower Matrix</button>
            <button class="pomodoro-btn">Pomodoro</button>
            <button class="settings-btn">Settings</button>
        </div>

    </div>

    <div id="content">

    </div>
</body>

</html>
